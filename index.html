<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças do Casal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg mt-10">
        <h1 class="text-2xl font-bold text-center mb-6">💰 Lançamento Financeiro</h1>

        <form id="financeForm" class="space-y-4">
            <input type="text" id="descricao" placeholder="Descrição (Ex: Mercado)" required class="w-full border p-2 rounded">
            
            <div class="flex gap-2">
                <input type="number" step="0.01" id="valor" placeholder="Valor R$" required class="w-full border p-2 rounded">
                <input type="date" id="data" required class="border p-2 rounded text-sm">
            </div>

            <div class="flex gap-2">
                <select id="conta" class="w-full border p-2 rounded bg-white text-sm">
                    <option value="Carteira">Carteira (Dinheiro)</option>
                    <option value="Nubank">Nubank</option>
                    <option value="Inter">Inter</option>
                    <option value="Cartão">Cartão de Crédito</option>
                </select>
                <input type="number" id="parcelas" value="1" min="1" placeholder="Parc." class="w-20 border p-2 rounded">
            </div>

            <button type="submit" id="btnSalvar" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700">
                Lançar Despesa
            </button>
        </form>

        <div id="lista" class="mt-8 space-y-2">
            <p class="text-center text-gray-400">Carregando últimos gastos...</p>
        </div>
    </div>

    <script>
        // --- TROQUE ESTES DADOS PELOS DO SEU SUPABASE ---
        const SUPABASE_URL = 'https://isqwlkrkjbczamuasgix.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzcXdsa3JramJjemFtdWFzZ2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjcyNzAsImV4cCI6MjA4NzAwMzI3MH0.g_aFpoVS4sRwpkBcZZ-31AlW6ZfPK7l_7-YfwRI7g6g';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('financeForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('btnSalvar').innerText = 'Salvando...';
            
            const desc = document.getElementById('descricao').value;
            const valorTotal = parseFloat(document.getElementById('valor').value);
            const dataBase = document.getElementById('data').value;
            const conta = document.getElementById('conta').value;
            const numParcelas = parseInt(document.getElementById('parcelas').value);

            const lancamentos = [];
            for (let i = 0; i < numParcelas; i++) {
                let d = new Date(dataBase + 'T12:00:00'); // Ajuste para evitar fuso horário
                d.setMonth(d.getMonth() + i);
                lancamentos.push({
                    descricao: numParcelas > 1 ? `${desc} (${i+1}/${numParcelas})` : desc,
                    valor: valorTotal / numParcelas,
                    data_transacao: d.toISOString().split('T')[0],
                    conta_id: conta
                });
            }

            const { error } = await _supabase.from('transacoes').insert(lancamentos);
            if (error) alert("Erro: " + error.message);
            else {
                form.reset();
                document.getElementById('data').value = new Date().toISOString().split('T')[0];
                carregar();
            }
            document.getElementById('btnSalvar').innerText = 'Lançar Despesa';
        });

        async function carregar() {
            const { data } = await _supabase.from('transacoes').select('*').order('data_transacao', { ascending: false }).limit(10);
            const lista = document.getElementById('lista');
            if (data) {
                lista.innerHTML = data.map(t => `
                    <div class="flex justify-between border-b p-2 text-sm bg-gray-50 rounded mb-1">
                        <span><strong>${t.descricao}</strong><br><small class="text-gray-400">${t.data_transacao} - ${t.conta_id}</small></span>
                        <span class="font-bold">R$ ${parseFloat(t.valor).toFixed(2)}</span>
                    </div>
                `).join('');
            }
        }

        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        carregar();
    </script>
</body>
</html>
