<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro - Casal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Transição suave para o menu no celular */
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 text-sm md:text-base">

    <div class="lg:hidden bg-slate-800 text-white p-4 flex justify-between items-center sticky top-0 z-30 shadow-lg">
        <h2 class="font-black tracking-tighter uppercase text-sm">Financeiro Pro</h2>
        <button onclick="toggleSidebar()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-xs uppercase">📂 Contas / Bancos</button>
    </div>

    <div class="flex flex-col lg:flex-row h-screen overflow-hidden relative">
        
        <div id="sidebar" class="fixed inset-y-0 left-0 z-40 w-80 bg-white border-r border-slate-200 flex flex-col shadow-2xl transform -translate-x-full lg:translate-x-0 lg:static lg:w-96 lg:shadow-none">
            
            <div class="p-4 border-b bg-slate-100 flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-black text-xl tracking-tighter text-slate-700 uppercase">Minhas Contas</h2>
                    <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 font-bold">✕</button>
                </div>
                <div class="flex gap-2">
                    <select id="filtroMes" onchange="carregarDados()" class="flex-grow text-xs font-bold border-2 border-blue-200 rounded-lg p-2 bg-white outline-none">
                        <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                        <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                        <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                        <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                    <select id="filtroAno" onchange="carregarDados()" class="w-24 text-xs font-bold border-2 border-blue-200 rounded-lg p-2 bg-white outline-none"></select>
                </div>
            </div>
            
            <div class="flex-grow overflow-y-auto p-4 space-y-6">
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">🏦 Bancos e Débito</h3>
                    <div id="listaBancos" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">💳 Cartões de Crédito</h3>
                    <div id="listaCartoes" class="space-y-2"></div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t grid grid-cols-2 gap-2">
                <button onclick="abrirModal('banco')" class="text-[10px] font-bold bg-white border border-blue-200 text-blue-600 p-2 rounded-lg hover:bg-blue-50 uppercase">Novo Banco</button>
                <button onclick="abrirModal('cartao')" class="text-[10px] font-bold bg-white border border-purple-200 text-purple-600 p-2 rounded-lg hover:bg-purple-50 uppercase">Novo Cartão</button>
                <button onclick="abrirModal('transacao')" class="col-span-2 bg-blue-600 text-white p-3 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all uppercase tracking-wide">＋ Lançar Gasto</button>
            </div>
        </div>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

        <div class="flex-grow overflow-y-auto bg-slate-50 p-4 md:p-8">
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6 max-w-4xl">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-400">
                    <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">À Vista</div>
                    <div id="resumoAVista" class="text-sm md:text-xl font-black text-slate-800">R$ 0,00</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-orange-400">
                    <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Parcelados</div>
                    <div id="resumoParcelado" class="text-sm md:text-xl font-black text-orange-600">R$ 0,00</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-slate-800 col-span-2 md:col-span-1">
                    <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Geral</div>
                    <div id="resumoTotal" class="text-sm md:text-xl font-black text-slate-900">R$ 0,00</div>
                </div>
            </div>

            <div id="detalheTituloContainer" class="mb-4 flex flex-col md:flex-row md:items-end justify-between gap-4 border-t pt-4">
                <div id="detalheTitulo">
                    <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Extrato</h1>
                    <p class="text-slate-500 font-medium text-xs">Selecione uma conta no menu.</p>
                </div>
                <button onclick="alternarFiltroParcelas()" id="btnFiltroParcelas" class="flex items-center justify-center gap-2 px-4 py-2 rounded-full border-2 border-slate-200 text-[9px] font-black uppercase transition-all bg-white shadow-sm">
                    <span id="indicadorFiltro" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    Exibir Só Parcelados
                </button>
            </div>
            
            <div id="listaMovimentacoes" class="max-w-3xl space-y-3 pb-24"></div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl w-full max-w-md shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-start mb-6">
                <h2 id="modalTitulo" class="text-xl font-black text-slate-800"></h2>
                <button onclick="fecharModal()" class="text-slate-400 font-bold p-2">✕</button>
            </div>
            <div id="modalCorpo" class="space-y-4"></div>
            <div class="flex justify-end gap-3 mt-10">
                <button onclick="fecharModal()" class="px-6 py-3 text-slate-400 font-bold uppercase text-xs">Sair</button>
                <button id="btnConfirmar" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase text-xs">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://isqwlkrkjbczamuasgix.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzcXdsa3JramJjemFtdWFzZ2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjcyNzAsImV4cCI6MjA4NzAwMzI3MH0.g_aFpoVS4sRwpkBcZZ-31AlW6ZfPK7l_7-YfwRI7g6g';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let bancos = [], cartoes = [], transacoes = [], idSelecionado = null, tipoSelecionado = null, filtroSomenteParcelados = false;

        // --- FUNÇÕES DE INTERFACE MOBILE ---
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isHidden = sb.classList.contains('-translate-x-full');
            
            if(isHidden) {
                sb.classList.remove('-translate-x-full');
                ov.classList.remove('hidden');
            } else {
                sb.classList.add('-translate-x-full');
                ov.classList.add('hidden');
            }
        }

        function fecharSidebarMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('overlay').classList.add('hidden');
            }
        }

        function configurarFiltroData() {
            const selMes = document.getElementById('filtroMes');
            const selAno = document.getElementById('filtroAno');
            const agora = new Date();
            selMes.value = String(agora.getMonth() + 1).padStart(2, '0');
            const anoAtual = agora.getFullYear();
            for(let i = anoAtual - 1; i <= anoAtual + 2; i++) { selAno.add(new Option(i, i)); }
            selAno.value = anoAtual;
        }

        async function carregarDados() {
            const { data: b } = await _supabase.from('bancos').select('*').order('nome');
            const { data: c } = await _supabase.from('cartoes').select('*, bancos(nome)');
            const { data: t } = await _supabase.from('transacoes').select('*').order('data_transacao', {ascending: false});
            bancos = b || []; cartoes = c || []; transacoes = t || [];
            calcularResumoGlobal();
            renderizarListas();
            if(idSelecionado) {
                tipoSelecionado === 'banco' ? verDetalhesBanco(idSelecionado) : verDetalhesCartao(idSelecionado);
            }
        }

        function getMesAnoFiltro() {
            return `${document.getElementById('filtroAno').value}-${document.getElementById('filtroMes').value}`;
        }

        function calcularResumoGlobal() {
            const filtroRaw = getMesAnoFiltro();
            let somaAVista = 0, somaParcelado = 0;
            transacoes.forEach(t => {
                const dataT = new Date(t.data_transacao + 'T15:00:00');
                let mesRef = `${dataT.getFullYear()}-${String(dataT.getMonth() + 1).padStart(2, '0')}`;
                if (t.cartao_id) {
                    const cartao = cartoes.find(c => c.id === t.cartao_id);
                    if (cartao && dataT.getDate() >= (cartao.dia_vencimento || 10)) {
                        let m = dataT.getMonth() + 1, a = dataT.getFullYear();
                        if (m > 11) { m = 0; a++; }
                        mesRef = `${a}-${String(m + 1).padStart(2, '0')}`;
                    }
                }
                if (mesRef === filtroRaw) {
                    const valor = parseFloat(t.valor);
                    if (t.total_parcelas > 1) somaParcelado += valor;
                    else somaAVista += valor;
                }
            });
            document.getElementById('resumoAVista').innerText = somaAVista.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('resumoParcelado').innerText = somaParcelado.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('resumoTotal').innerText = (somaAVista + somaParcelado).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        function renderizarListas() {
            const filtroRaw = getMesAnoFiltro();
            document.getElementById('listaBancos').innerHTML = bancos.map(b => {
                const total = transacoes.filter(t => {
                    const dT = new Date(t.data_transacao + 'T15:00:00');
                    return t.banco_id === b.id && `${dT.getFullYear()}-${String(dT.getMonth() + 1).padStart(2, '0')}` === filtroRaw;
                }).reduce((acc, curr) => acc + parseFloat(curr.valor), 0);
                return `<div class="group relative p-4 bg-white rounded-2xl cursor-pointer border-2 ${idSelecionado === b.id ? 'border-blue-500 bg-blue-50' : 'border-transparent shadow-sm'}">
                        <div onclick="verDetalhesBanco('${b.id}'); fecharSidebarMobile();">
                            <div class="font-bold text-slate-700">${b.nome}</div>
                            <div class="text-[10px] font-black text-blue-600 uppercase">R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        </div>
                        <button onclick="abrirModal('editar_banco', '${b.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 bg-slate-100 text-[9px] p-1 rounded font-bold">EDIT</button>
                    </div>`;
            }).join('');

            document.getElementById('listaCartoes').innerHTML = cartoes.map(c => {
                const total = transacoes.filter(t => {
                    if (t.cartao_id !== c.id) return false;
                    const dT = new Date(t.data_transacao + 'T15:00:00');
                    let m = dT.getMonth(), a = dT.getFullYear();
                    if (dT.getDate() >= (c.dia_vencimento || 10)) { m++; if(m>11){m=0;a++;} }
                    return `${a}-${String(m + 1).padStart(2, '0')}` === filtroRaw;
                }).reduce((acc, curr) => acc + parseFloat(curr.valor), 0);
                return `<div class="group relative p-4 bg-white rounded-2xl cursor-pointer border-2 ${idSelecionado === c.id ? 'border-purple-500 bg-purple-50' : 'border-transparent shadow-sm'}">
                        <div onclick="verDetalhesCartao('${c.id}'); fecharSidebarMobile();">
                            <div class="font-bold text-slate-700">${c.nome}</div>
                            <div class="text-[10px] text-purple-600 font-bold uppercase italic tracking-tighter">Fatura: R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        </div>
                        <button onclick="abrirModal('editar_cartao', '${c.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 bg-slate-100 text-[9px] p-1 rounded font-bold">EDIT</button>
                    </div>`;
            }).join('');
        }

        async function verDetalhesBanco(id) {
            idSelecionado = id; tipoSelecionado = 'banco'; renderizarListas();
            const filtroRaw = getMesAnoFiltro();
            const banco = bancos.find(b => b.id === id);
            let filtrados = transacoes.filter(t => {
                const d = new Date(t.data_transacao + 'T15:00:00');
                return t.banco_id === id && `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === filtroRaw;
            });
            if(filtroSomenteParcelados) filtrados = filtrados.filter(t => t.total_parcelas > 1);
            document.getElementById('detalheTitulo').innerHTML = `<h1 class="text-xl font-black">${banco.nome}</h1><p class="text-[9px] font-bold text-blue-500 uppercase">Mês ${filtroRaw}</p>`;
            renderizarTransacoes(filtrados);
        }

        async function verDetalhesCartao(id) {
            idSelecionado = id; tipoSelecionado = 'cartao'; renderizarListas();
            const filtroRaw = getMesAnoFiltro();
            const cartao = cartoes.find(c => c.id === id);
            let filtrados = transacoes.filter(t => {
                if (t.cartao_id !== id) return false;
                const d = new Date(t.data_transacao + 'T15:00:00');
                let m = d.getMonth(), a = d.getFullYear();
                if (d.getDate() >= (cartao.dia_vencimento || 10)) { m++; if(m>11){m=0;a++;} }
                return `${a}-${String(m + 1).padStart(2, '0')}` === filtroRaw;
            });
            if(filtroSomenteParcelados) filtrados = filtrados.filter(t => t.total_parcelas > 1);
            document.getElementById('detalheTitulo').innerHTML = `<h1 class="text-xl font-black">${cartao.nome}</h1><p class="text-[9px] font-bold text-purple-500 uppercase">Fatura ${filtroRaw}</p>`;
            renderizarTransacoes(filtrados);
        }

        function renderizarTransacoes(lista) {
            const container = document.getElementById('listaMovimentacoes');
            container.innerHTML = lista.length ? lista.map(t => `
                <div class="group flex justify-between items-center p-4 bg-white shadow-sm rounded-xl border-l-4 ${t.cartao_id ? 'border-purple-500' : 'border-blue-500'}">
                    <div onclick="abrirModal('editar_transacao', '${t.id}')" class="flex-grow cursor-pointer">
                        <div class="font-bold text-slate-700 leading-tight">${t.descricao} ${t.total_parcelas > 1 ? `<span class="text-orange-500 text-[9px] ml-1 font-black">[${t.parcela_atual}/${t.total_parcelas}]</span>` : ''}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">${new Date(t.data_transacao + 'T15:00:00').toLocaleDateString()}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-slate-900 italic">R$ ${parseFloat(t.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        <button onclick="confirmarExclusao('${t.id}')" class="text-[9px] text-red-400 font-black uppercase lg:opacity-0 lg:group-hover:opacity-100">Excluir</button>
                    </div>
                </div>`).join('') : '<div class="p-10 text-center text-slate-300 font-bold uppercase text-xs">Sem registros</div>';
        }

        async function confirmarExclusao(id) {
            const t = transacoes.find(x => x.id === id);
            if (!t) return;
            if (t.total_parcelas <= 1) {
                if (confirm("Excluir este gasto?")) { await _supabase.from('transacoes').delete().eq('id', id); carregarDados(); }
                return;
            }
            const o = prompt("Parcelado! Opções:\n1-Apenas esta\n2-Esta e próximas\n3-Todo o parcelamento");
            if (o === "1") await _supabase.from('transacoes').delete().eq('id', id);
            else if (o === "2") await _supabase.from('transacoes').delete().eq('descricao', t.descricao).eq('cartao_id', t.cartao_id).gte('parcela_atual', t.parcela_atual);
            else if (o === "3") await _supabase.from('transacoes').delete().eq('descricao', t.descricao).eq('cartao_id', t.cartao_id);
            else return;
            carregarDados();
        }

        function autoSelecionarBanco(cartaoId) {
            if (!cartaoId) return;
            const c = cartoes.find(x => x.id === cartaoId);
            if (c && c.banco_id) document.getElementById('t_banco').value = c.banco_id;
        }

        function alternarFiltroParcelas() {
            filtroSomenteParcelados = !filtroSomenteParcelados;
            const btn = document.getElementById('btnFiltroParcelas');
            if(filtroSomenteParcelados) btn.classList.add('border-orange-500', 'text-orange-600', 'bg-orange-50');
            else btn.classList.remove('border-orange-500', 'text-orange-600', 'bg-orange-50');
            if(idSelecionado) tipoSelecionado === 'banco' ? verDetalhesBanco(idSelecionado) : verDetalhesCartao(idSelecionado);
        }

        function abrirModal(tipo, id = null) {
            const modal = document.getElementById('modal');
            const corpo = document.getElementById('modalCorpo');
            const btn = document.getElementById('btnConfirmar');
            modal.classList.replace('hidden', 'flex');

            if(tipo === 'banco' || tipo === 'editar_banco') {
                const b = id ? bancos.find(x => x.id === id) : null;
                document.getElementById('modalTitulo').innerText = id ? "Editar Banco" : "Novo Banco";
                corpo.innerHTML = `<label class="text-[10px] font-black text-slate-400">Nome</label><input id="n_nome" value="${b?.nome || ''}" class="w-full border-2 p-3 rounded-xl"><label class="text-[10px] font-black text-slate-400">Saldo Inicial</label><input id="n_saldo" type="number" value="${b?.saldo_inicial || ''}" class="w-full border-2 p-3 rounded-xl">`;
                btn.onclick = async () => {
                    const obj = { nome: document.getElementById('n_nome').value, saldo_inicial: document.getElementById('n_saldo').value || 0 };
                    id ? await _supabase.from('bancos').update(obj).eq('id', id) : await _supabase.from('bancos').insert(obj);
                    fecharModal(); carregarDados();
                };
            } 
            else if(tipo === 'cartao' || tipo === 'editar_cartao') {
                const c = id ? cartoes.find(x => x.id === id) : null;
                document.getElementById('modalTitulo').innerText = id ? "Editar Cartão" : "Novo Cartão";
                const bts = bancos.map(b => `<option value="${b.id}" ${c?.banco_id === b.id ? 'selected' : ''}>${b.nome}</option>`).join('');
                corpo.innerHTML = `<label class="text-[10px] font-black text-slate-400">Nome</label><input id="n_nome_c" value="${c?.nome || ''}" class="w-full border-2 p-3 rounded-xl"><label class="text-[10px] font-black text-slate-400">Vencimento</label><input id="n_venc_c" type="number" value="${c?.dia_vencimento || 10}" class="w-full border-2 p-3 rounded-xl"><label class="text-[10px] font-black text-slate-400">Banco</label><select id="n_banco_c" class="w-full border-2 p-3 rounded-xl">${bts}</select>`;
                btn.onclick = async () => {
                    const obj = { nome: document.getElementById('n_nome_c').value, dia_vencimento: document.getElementById('n_venc_c').value, banco_id: document.getElementById('n_banco_c').value };
                    id ? await _supabase.from('cartoes').update(obj).eq('id', id) : await _supabase.from('cartoes').insert(obj);
                    fecharModal(); carregarDados();
                };
            }
            else if(tipo === 'transacao' || tipo === 'editar_transacao') {
                const t = id ? transacoes.find(x => x.id === id) : null;
                document.getElementById('modalTitulo').innerText = id ? "Editar Gasto" : "Lançar Gasto";
                const cts = `<option value="">Débito</option>` + cartoes.map(c => `<option value="${c.id}" ${t?.cartao_id === c.id ? 'selected' : ''}>${c.nome}</option>`).join('');
                const bks = bancos.map(b => `<option value="${b.id}" ${t?.banco_id === b.id ? 'selected' : ''}>${b.nome}</option>`).join('');
                corpo.innerHTML = `
                    <input id="t_desc" value="${t?.descricao || ''}" placeholder="Descrição" class="w-full border-2 p-3 rounded-xl">
                    <input id="t_val" type="number" step="0.01" value="${t?.valor || ''}" placeholder="Valor" class="w-full border-2 p-3 rounded-xl">
                    <input id="t_data" type="date" value="${t?.data_transacao || new Date().toISOString().split('T')[0]}" class="w-full border-2 p-3 rounded-xl">
                    <label class="text-[10px] font-black text-slate-400">Cartão</label><select id="t_cartao" onchange="autoSelecionarBanco(this.value)" class="w-full border-2 p-3 rounded-xl bg-purple-50">${cts}</select>
                    <label class="text-[10px] font-black text-slate-400">Banco</label><select id="t_banco" class="w-full border-2 p-3 rounded-xl bg-blue-50">${bks}</select>
                    ${!id ? `<label class="text-[10px] font-black text-slate-400">Parcelas</label><input id="t_parc" type="number" min="1" value="1" class="w-full border-2 p-3 rounded-xl">` : ''}
                `;
                btn.onclick = async () => {
                    const obj = { descricao: document.getElementById('t_desc').value, valor: parseFloat(document.getElementById('t_val').value), data_transacao: document.getElementById('t_data').value, banco_id: document.getElementById('t_banco').value, cartao_id: document.getElementById('t_cartao').value || null };
                    if(id) await _supabase.from('transacoes').update(obj).eq('id', id);
                    else {
                        const p = parseInt(document.getElementById('t_parc').value) || 1;
                        const ins = [];
                        for(let i=0; i<p; i++) {
                            let d = new Date(obj.data_transacao + 'T15:00:00'); d.setMonth(d.getMonth() + i);
                            ins.push({ ...obj, valor: obj.valor/p, data_transacao: d.toISOString().split('T')[0], parcela_atual: i+1, total_parcelas: p });
                        }
                        await _supabase.from('transacoes').insert(ins);
                    }
                    fecharModal(); carregarDados();
                };
            }
        }

        function fecharModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
        configurarFiltroData(); carregarDados();
